<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💰 博彩红利专区 - 2026 狂热站</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo" id="site-name">加载中...</a>
      <div class="nav-links">
        <a href="index.html">赛程大厅</a>
        <a href="predict.html" class="highlight">🔥 免费竞猜</a>
        <a href="odds.html" class="active">博彩红利</a>
        <a href="shop.html">周边商城</a>
      </div>
    </nav>
  </header>

  <main>
    <div class="hero" style="padding: 2rem;">
      <h1>💰 博彩红利专区</h1>
      <p style="color: var(--text-muted);">通过我们的链接注册，获取全网最高的新户奖励！</p>
    </div>

    <div class="warning-box">
      <p class="title">⚠️ 负责任博彩警告</p>
      <p class="text">请确保您已满18岁，且博彩行为在您所在地区合法。</p>
    </div>

    <div class="grid" id="bookmakers-grid">
      <!-- 动态生成 -->
    </div>

    <div class="how-to" style="margin-top: 3rem;">
      <h2>💡 如何使用</h2>
      <ol>
        <li>点击上方任意平台的"立即注册"按钮</li>
        <li>使用我们的链接完成新用户注册</li>
        <li>完成首充，享受专属高额红利！</li>
      </ol>
    </div>
  </main>

  <footer>
    <p id="footer-name">© 加载中...</p>
    <p class="disclaimer">免责声明：通过本站链接注册可能使我们获得佣金。请理性参与。</p>
  </footer>

  <script src="data.js"></script>
  <script>
    document.getElementById('site-name').textContent = siteData.site.name;
    document.getElementById('footer-name').textContent = '© 2026 ' + siteData.site.name;

    const grid = document.getElementById('bookmakers-grid');
    siteData.bookmakers.forEach(b => {
      const card = document.createElement('div');
      card.className = 'bookmaker-card';
      card.innerHTML = `
        <div class="bookmaker-logo">${b.logo}</div>
        <div class="bookmaker-name">${b.name}</div>
        <div class="bookmaker-rating">${b.rating}</div>
        <div class="bookmaker-bonus">${b.bonus}</div>
        <p class="bookmaker-desc">${b.description}</p>
        <a href="${b.link}" target="_blank" rel="noopener noreferrer" class="bookmaker-link">🔗 立即注册</a>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
