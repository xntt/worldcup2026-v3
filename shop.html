<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👕 Official Shop - World Cup 2026 Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo" id="site-name">Loading...</a>
      <div class="nav-links">
        <a href="index.html">Schedule</a>
        <a href="predict.html" class="highlight">🔥 Free Predictions</a>
        <a href="odds.html">Betting Bonuses</a>
        <a href="shop.html" class="active">Shop</a>
      </div>
    </nav>
  </header>

  <main>
    <div class="hero" style="padding: 2rem;">
      <h1>👕 Official Shop</h1>
      <p style="color: var(--text-muted);">Get official gear and support your team!</p>
    </div>

    <div class="grid" id="products-grid"></div>

    <div class="vip-banner" style="margin-top: 3rem;">
      <h2>🎁 VIP Member Exclusive</h2>
      <p>Join VIP for 20% off all items plus exclusive limited products!</p>
      <a href="predict.html" class="btn btn-primary">Join VIP Now ➔</a>
    </div>
  </main>

  <footer>
    <p id="footer-name">© Loading...</p>
    <p class="disclaimer">Official merchandise. Limited stock!</p>
  </footer>

  <script src="data.js"></script>
  <script>
    document.getElementById('site-name').textContent = siteData.site.name;
    document.getElementById('footer-name').textContent = '© 2026 ' + siteData.site.name;

    const grid = document.getElementById('products-grid');
    siteData.products.forEach(p => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <div class="product-image">${p.image}</div>
        <div class="product-name">${p.name}</div>
        <p class="product-desc">${p.description}</p>
        <div class="product-price">${p.price}</div>
        <a href="#" class="product-btn" onclick="alert('Coming soon! Stay tuned.'); return false;">Add to Cart</a>
      </div>`;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
