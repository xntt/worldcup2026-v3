<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Loading...</title>
  <meta name="description" content="Join World Cup predictions, win exclusive merch and the best betting bonuses!">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo" id="site-name">Loading...</a>
      <div class="nav-links">
        <a href="index.html" class="active">Schedule</a>
        <a href="predict.html" class="highlight">🔥 Free Predictions</a>
        <a href="odds.html">Betting Bonuses</a>
        <a href="shop.html">Shop</a>
      </div>
    </nav>
  </header>

  <main id="main-content">
    <section class="hero">
      <h1 id="hero-title">Loading...</h1>
      <p id="hero-desc">Loading...</p>
      <a href="predict.html" class="btn btn-primary">Join Today's Predictions ➔</a>
    </section>

    <section>
      <h2 class="section-title">📅 Featured Matches</h2>
      <div class="grid" id="matches-grid"></div>
    </section>
  </main>

  <footer>
    <p id="footer-name">© Loading...</p>
    <p class="disclaimer">Disclaimer: This site does not provide gambling services. Using our affiliate links may earn us commission. Please play responsibly.</p>
  </footer>

  <script src="data.js"></script>
  <script>
    document.getElementById('page-title').textContent = siteData.site.title;
    document.getElementById('site-name').textContent = siteData.site.name;
    document.getElementById('hero-title').innerHTML = siteData.site.description + ', <span>' + siteData.site.name + '</span>';
    document.getElementById('footer-name').textContent = '© 2026 ' + siteData.site.name;

    const matchesGrid = document.getElementById('matches-grid');
    siteData.matches.forEach(match => {
      const card = document.createElement('div');
      card.className = 'match-card';
      card.innerHTML = `
        <div class="match-meta">
          <span>📍 ${match.stadium}</span>
          <span class="status">${match.status} • ${match.time}</span>
        </div>
        <div class="match-teams">
          <span>${match.teamA}</span>
          <span class="match-score">${match.score}</span>
          <span>${match.teamB}</span>
        </div>
        <div class="match-actions">
          <a href="predict.html?match=${match.id}" class="btn-predict">Predict</a>
          <a href="odds.html" class="btn-odds">View Odds</a>
        </div>
      `;
      matchesGrid.appendChild(card);
    });
  </script>
</body>
</html>
